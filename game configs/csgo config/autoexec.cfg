// autoexec configuration file

// setup local server tick rate 
tick 128 

// set rates according to your internet connection 
rate 128000 

// all the essential settings 
maxfps 0 
con_enable 1 
gameinstructor_enable 0 
cl_disablefreezecam 1 
cl_disablehtmlmotd 1 
cl_autowepswitch 0 
cl_forcepreload 0 
cl_join_advertise 2 
lobby_default_privacy_bits1 0 
bind w +forward; r_cleardecals 
bind v +voicerecord 
unbind mouse4; cl_showloadout 1 
hud_showtargetid 1 
cl_hud_bomb_under_radar 1 
cl_hud_playercount_showcount 0 
cl_hud_playercount_pos 1 
cl_teammate_colors_show 1 
cl_hud_radar_scale 1 
cl_radar_scale 0.4 
cl_radar_always_centered 0 
cl_radar_icon_scale_min 1 
m_rawinput 1 
m_customaccel 0 
m_mousespeed 0 
cl_cmdrate 128 
cl_updaterate 128 
cl_interp 0
cl_interp_ratio 1 
cl_lagcompensation 1 
cl_predict 1 
cl_predictweapons 1 

// enable netgraph stats under scoreboard 
net_graph 1 
net_graphpos 2 

// switch all music off except 10s round end warning 
snd_musicvolume 0.3 
snd_deathcamera_volume 0 
snd_mapobjective_volume 0 
snd_menumusic_volume 0 
snd_roundend_volume 0 
snd_roundstart_volume 0 
snd_tensecondwarning_volume 0.2 

// jump throw script binded to mouse4
alias "+jumpthrow" "+jump;-attack;-attack2" 
alias "-jumpthrow" "-jump" 
bind mouse4 "+jumpthrow" 

// weapon buy binds
bind "8" "buy ak47; buy m4a1;"
bind "6" " buy vesthelm; buy vest; buy vesthelm;"
bind "5" " buy vest; buy defuser;"
bind "7" "buy p250;"
bind "0" "buy mac10; buy mp9;"
bind "9" "buy ump45;"
bind "-" " buy flashbang; buy flashbang; buy smokegrenade; buy incgrenade; buy molotov;"
bind "=" "buy awp;"








  
